name: pcrypt
description: PCrypt Flutter implementation

version: 1.0.0

environment:
  sdk: ">=2.17.0 <=4.0.0"

publish_to: none

dependencies:
  auto_hyphenating_text: ^0.3.1
  auto_size_text: ^3.0.0
  biometric_signature: ^8.2.0
  built_collection: ^5.1.1
  cupertino_icons: ^1.0.8
  device_info_plus: ^12.2.0
  dio: ^5.9.0
  encrypt: ^5.0.3
  equatable: ^2.0.7
  file_picker: ^10.3.6
  flutter:
    sdk: flutter
  flutter_autofill_service:
    path: flutter_autofill_service
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  fluttertoast: ^9.0.0
  flutter_pdfview: ^1.4.3
  flutter_secure_storage: ^9.2.4
  flutter_svg: ^2.2.2
  flutter_webview_plugin:
    path: flutter_webview_plugin-master
  font_awesome_flutter: ^10.12.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_fonts: ^6.3.2
  http: ^1.6.0
  image: ^4.5.4
  image_picker: ^1.2.1
  intl: ^0.20.2
  json_annotation: ^4.9.0
  local_auth: ^3.0.0
  location: ^8.0.1
  mime: ^2.0.0
  mobile_scanner: ^7.1.3
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  privacy_screen:
    path: privacy_screen-master
  qr_flutter: ^4.1.0
  rxdart: ^0.28.0
  shared_preferences: ^2.5.3
  sqflite: ^2.4.2
  url_launcher: ^6.3.2
  webview_flutter: ^4.13.0

dev_dependencies:
  build_runner: ^2.10.3
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  lints: ^6.0.0

# I am only generating android app icons with this package
# For iOS app icons, I am using https://www.appicon.co/#app-icon
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21


flutter:
  uses-material-design: true

  fonts:
    - family: CustomIcons
      fonts:
        - asset: fonts/CustomIcons.ttf

  assets:
    - assets/
    #    - assets/logo.png
    - assets/user_default.png
    - js/lib/other/prototypes.js
    - js/lib/srp6a/thinbus-srp6a-sha256-versioned.js
    - js/lib/srp6a/thinbus-srp-config.js
    - js/lib/elliptic.min.js
    - js/lib/elliptic.min.js
    - js/lib/forge.min.js
    - js/lib/pcrypt.js
    - js/lib/pcrypt.config.js
    - js/lib/
    - js/_.js
    - .env

analyzer:
  errors:
    invalid_annotation_target: ignore



